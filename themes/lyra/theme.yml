id: lyra
name: Lyra
version: 1

BUNDLED_FONTS:
  - name: Ubuntu
    styles: [regular, italic, bold, bolditalic]
    source: google-fonts

header:
  style: left-aligned-with-rule
  titleStyle: bold
  subtitleStyle: regular
  bottomBorderHeight: 0
  height: 84

selection:
  style: rounded-fill
  cornerRadius: 6
  textInverted: false

cover:
  style: card
  cornerRadius: 0

list:
  subtitleStyle: regular
  buttonMenuLabelStyle: regular
  rowHeight: 40
  rowHeightWithSubtitle: 60
  menuRowHeight: 64
  menuSpacing: 8

buttonHintsStyle: rounded-filled
sideButtonHintsStyle: rounded
scrollIndicatorStyle: line-thumb
batteryStyle: segmented
showsFileIcons: true

layout:
  topPadding: 5
  verticalSpacing: 16
  contentSidePadding: 20

battery:
  width: 16
  height: 12
  barHeight: 40

buttonHints:
  height: 40
  sideWidth: 30

tabBar:
  spacing: 8
  height: 40
  style: dithered-rounded

scrollBar:
  width: 4
  rightOffset: 5

home:
  topPadding: 56
  coverHeight: 226
  coverTileHeight: 242
  recentBooksCount: 1
  continueReadingInMenu: false
  menuTopOffset: 16

progressBar:
  height: 16
  marginTop: 1

statusBar:
  horizontalMargin: 5
  verticalMargin: 19

keyboard:
  keyWidth: 31
  keyHeight: 40
  keySpacing: 0
  bottomKeyHeight: 35
  bottomKeySpacing: 5
  bottomAligned: true
  centeredText: false
  verticalOffset: -7
  textFieldWidthPercent: 85
  widthPercent: 90
  keyCornerRadius: 6
  fillUnselected: false
  outlineAllUnselected: false
  drawSpecialOutlineWhenUnselected: true
  secondaryLabelRightPadding: 1
  secondaryLabelTopPadding: 0
  minArrowHeadSize: 0

library:
  coverBorderRadius: 3
  coverDropShadowOffsetX: 2
  coverDropShadowOffsetY: 2
  pageIndicatorShape: rounded-rect 
  pageIndicatorSize: 16
  pageIndicatorCornerRadius: 2
  pageIndicatorFill: darkgray
  pageIndicatorFillSelected: black 
  pageIndicatorBorder: clear
  pageIndicatorBorderSelected: clear
  pageIndicatorGap: 6

popup:
  topOffsetRatio: 0.165
  marginX: 16
  marginY: 12
  frameThickness: 2
  cornerRadius: 6
  textBold: false
  textInverted: false
  textBaselineOffsetY: -2
  progress:
    barHeight: 4
    drawOutline: false
    clampPercent: false
    fillInverted: false
    outlineInverted: false

popupMenu:
  rowHeight: 36
  borderThickness: 2
  cornerRadius: 6
  shadowOffsetX: 2
  shadowOffsetY: 2
  paddingX: 12
  panelGap: 6
  selectionStyle: rounded-fill
  selectionCornerRadius: 4
  selectionTextInverted: true
  subPanelMutedFill: true
  fontRole: body
  annotationFontRole: body

textField:
  horizontalPadding: 6
  normalThickness: 1
  cursorThickness: 3
  lineEndOffset: 0

fonts:
  title:
    builtin: ui-12
  heading:
    builtin: ui-12
  body:
    builtin: ui-10
  caption:
    builtin: small
  accent:
    builtin: small
  body-compact:
    bundled:
      family: Ubuntu
      size: 7
    builtin: small
  caption-compact:
    bundled:
      name: Ubuntu
      size: 7
  accent-compact:
    builtin: small
