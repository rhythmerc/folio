id: roundedraff
name: RoundedRaff
version: 1

header:
  style: left-aligned-plain
  titleStyle: bold
  subtitleStyle: regular
  bottomBorderHeight: 0
  height: 45

selection:
  style: rounded-row-always
  cornerRadius: 20
  textInverted: true

cover:
  style: card-rounded
  cornerRadius: 18

list:
  subtitleStyle: regular
  buttonMenuLabelStyle: bold
  rowHeight: 42
  rowHeightWithSubtitle: 69
  menuRowHeight: 42
  menuSpacing: 6

buttonHintsStyle: paired-groups
sideButtonHintsStyle: sharp
scrollIndicatorStyle: thumb
batteryStyle: solid
showsFileIcons: false

layout:
  topPadding: 0
  verticalSpacing: 10
  contentSidePadding: 20

battery:
  width: 15
  height: 12
  barHeight: 20

buttonHints:
  height: 40
  sideWidth: 30

tabBar:
  spacing: 10
  height: 50
  style: slot-rounded

scrollBar:
  width: 4
  rightOffset: 5

home:
  topPadding: 55
  coverHeight: 300
  coverTileHeight: 350
  recentBooksCount: 1
  continueReadingInMenu: true
  menuTopOffset: 20

progressBar:
  height: 16
  marginTop: 1

statusBar:
  horizontalMargin: 5
  verticalMargin: 19

keyboard:
  keyWidth: 22
  keyHeight: 30
  keySpacing: 10
  bottomKeyHeight: 30
  bottomKeySpacing: 5
  bottomAligned: true
  centeredText: false
  verticalOffset: 0
  textFieldWidthPercent: 85
  widthPercent: 90
  keyCornerRadius: 10
  fillUnselected: true
  outlineAllUnselected: true
  drawSpecialOutlineWhenUnselected: true
  secondaryLabelRightPadding: 3
  secondaryLabelTopPadding: 1
  minArrowHeadSize: 1

library:
  coverBorderRadius: 5
  coverDropShadowOffsetX: 0
  coverDropShadowOffsetY: 0
  pageIndicatorShape: circle 
  pageIndicatorSize: 12
  pageIndicatorFill: clear
  pageIndicatorFillSelected: black 
  pageIndicatorBorder: black
  pageIndicatorBorderSelected: black

popup:
  topOffsetRatio: 0.12
  marginX: 20
  marginY: 14
  frameThickness: 2
  cornerRadius: 18
  textBold: true
  textInverted: false
  textBaselineOffsetY: -2
  progress:
    barHeight: 4
    drawOutline: true
    clampPercent: true
    fillInverted: false
    outlineInverted: false

textField:
  horizontalPadding: 8
  normalThickness: 2
  cursorThickness: 3
  lineEndOffset: -1

fonts:
  title:
    builtin: ui-12
  heading:
    builtin: ui-12
  body:
    builtin: ui-12
  caption:
    builtin: small
  accent:
    builtin: small
  body-compact:
    builtin: ui-10
  caption-compact:
    file: fonts/Ubuntu_7.cpfont
    builtin: small
  accent-compact:
    builtin: small
