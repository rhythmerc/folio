# Theme data schema — single source of truth for ThemeData struct, enums,
# Folio defaults, and JSON parser generation.
#
# Run: python scripts/gen_theme.py
# Generated files:
#   src/components/themes/ThemeData.generated.h
#   src/components/themes/ThemeDefaults.generated.h
#   src/ThemeJsonParser.generated.cpp

# Types defined elsewhere whose JSON string mappings the parser needs.
# The generator emits their EnumEntry tables but NOT their enum definitions.
external_types:
  Color:
    include: <GfxRenderer.h>
    table_name: kColors
    variants:
      - { json: "clear",      cpp: "Color::Clear" }
      - { json: "white",      cpp: "Color::White" }
      - { json: "lightgray",  cpp: "Color::LightGray" }
      - { json: "darkgray",   cpp: "Color::DarkGray" }
      - { json: "black",      cpp: "Color::Black" }

  EpdFontFamily::Style:
    include: <EpdFontFamily.h>
    table_name: kFontStyles
    variants:
      - { json: "regular",     cpp: "EpdFontFamily::REGULAR" }
      - { json: "bold",        cpp: "EpdFontFamily::BOLD" }
      - { json: "italic",      cpp: "EpdFontFamily::ITALIC" }
      - { json: "bold-italic", cpp: "EpdFontFamily::BOLD_ITALIC" }

  FontRole:
    include: '"components/themes/BaseTheme.h"'
    table_name: kFontRoleStyles
    variants:
      - { json: "title",          cpp: "FontRole::Title" }
      - { json: "heading",        cpp: "FontRole::Heading" }
      - { json: "body",           cpp: "FontRole::Body" }
      - { json: "caption",        cpp: "FontRole::Caption" }
      - { json: "accent",         cpp: "FontRole::Accent" }
      - { json: "body-compact",   cpp: "FontRole::BodyCompact" }
      - { json: "caption-compact", cpp: "FontRole::CaptionCompact" }
      - { json: "accent-compact", cpp: "FontRole::AccentCompact" }

# Folio built-in identity — fields that live outside the schema-driven struct
# but are needed to generate a complete BuiltinThemes::Folio constant.
folio:
  id: folio
  fonts:
    titleId:          NOTOSERIF_14_FONT_ID
    headingId:        NOTOSERIF_14_FONT_ID
    bodyId:           LITERATA_10_FONT_ID
    captionId:        LITERATA_10_FONT_ID
    accentId:         LITERATA_10_FONT_ID
    bodyIdCompact:    NOTOSERIF_8_FONT_ID
    captionIdCompact: NOTOSERIF_6_FONT_ID
    accentIdCompact:  NOTOSERIF_5_FONT_ID
    bodyIdLarge:      NOTOSERIF_12_FONT_ID

# Theme-owned enums. Generator emits `enum class X : uint8_t { ... };`
enums:
  HeaderStyle:
    - { name: CenteredTitle,       json: "centered-title" }
    - { name: LeftAlignedWithRule,  json: "left-aligned-with-rule" }
    - { name: LeftAlignedBordered, json: "left-aligned-bordered" }
    - { name: LeftAlignedPlain,    json: "left-aligned-plain" }

  SelectionStyle:
    - { name: SolidFill,        json: "solid-fill" }
    - { name: RoundedFill,      json: "rounded-fill" }
    - { name: RoundedRowAlways, json: "rounded-row-always" }
    - { name: LayeredFrame,     json: "layered-frame" }

  CoverStyle:
    - { name: Default,     json: "default" }
    - { name: Card,        json: "card" }
    - { name: CardRounded, json: "card-rounded" }

  ButtonHintsStyle:
    - { name: Boxed,         json: "boxed" }
    - { name: Hairline,      json: "hairline" }
    - { name: RoundedFilled, json: "rounded-filled" }
    - { name: PairedGroups,  json: "paired-groups" }

  SideButtonHintsStyle:
    - { name: Sharp,   json: "sharp" }
    - { name: Rounded, json: "rounded" }

  TabBarStyle:
    - { name: Underline,       json: "underline" }
    - { name: DitheredRounded, json: "dithered-rounded" }
    - { name: SlotRounded,     json: "slot-rounded" }

  ScrollIndicatorStyle:
    - { name: Arrows,    json: "arrows" }
    - { name: Thumb,     json: "thumb" }
    - { name: LineThumb, json: "line-thumb" }

  BatteryStyle:
    - { name: Solid,     json: "solid" }
    - { name: Segmented, json: "segmented" }

  IndicatorShape:
    - { name: Circle,      json: "circle" }
    - { name: Square,      json: "square" }
    - { name: RoundedRect, json: "rounded-rect" }

  PopupMenuSelectionStyle:
    - { name: SolidFill,   json: "solid-fill" }
    - { name: RoundedFill, json: "rounded-fill" }
    - { name: BorderOnly,  json: "border-only" }

# ThemeData struct members in declaration order.
# Each entry is either:
#   - A nested struct group:  { group: name, fields: [...], children: {...} }
#   - A top-level field:      { cpp: name, type: T, default: V }
# "json" defaults to "cpp" when omitted. "default" is the generic value; add
# "folio" to give the built-in Folio theme a different value. Field types: int,
# bool, float, string, or any enum/external_type above.
struct:
  - group: header
    struct_name: Header
    fields:
      - { cpp: style,              type: HeaderStyle,          default: "HeaderStyle::LeftAlignedBordered" }
      - { cpp: titleStyle,         type: EpdFontFamily::Style, default: "EpdFontFamily::BOLD" }
      - { cpp: subtitleStyle,      type: EpdFontFamily::Style, default: "EpdFontFamily::ITALIC" }
      - { cpp: bottomBorderHeight, type: int,                  default: 3 }
      - { cpp: height,             type: int,                  default: 89 }
      - { cpp: fontRole,           type: FontRole,             default: "FontRole::Title" }
      - { cpp: titlePrepend,       type: string,               default: "" }
      - { cpp: titleAppend,        type: string,               default: "",                                folio: "." }

  - group: selection
    struct_name: Selection
    fields:
      - { cpp: style,        type: SelectionStyle, default: "SelectionStyle::LayeredFrame" }
      - { cpp: cornerRadius, type: int,            default: 0 }
      - { cpp: textInverted, type: bool,           default: false }

  - group: cover
    struct_name: Cover
    fields:
      - { cpp: style,        type: CoverStyle, default: "CoverStyle::Default" }
      - { cpp: cornerRadius, type: int,        default: 0 }

  - group: list
    struct_name: List
    fields:
      - { cpp: subtitleStyle,        type: EpdFontFamily::Style, default: "EpdFontFamily::ITALIC" }
      - { cpp: buttonMenuLabelStyle, type: EpdFontFamily::Style, default: "EpdFontFamily::REGULAR" }
      - { cpp: rowHeight,            type: int,                  default: 40 }
      - { cpp: rowHeightWithSubtitle, type: int,                 default: 60 }
      - { cpp: menuRowHeight,        type: int,                  default: 56 }
      - { cpp: menuSpacing,          type: int,                  default: 14 }
      # List-row selection, independent of the book-grid selection (which keeps
      # `selection.style`). Lets Folio invert list rows without touching the grid.
      - { cpp: selectionStyle,        type: SelectionStyle, default: "SelectionStyle::SolidFill" }
      # Hairline divider drawn under each unselected row (prototype fidelity).
      - { cpp: showDividers,          type: bool,           default: true }

  # Top-level style dispatchers (interleaved between nested structs)
  - { cpp: buttonHintsStyle,     type: ButtonHintsStyle,     default: "ButtonHintsStyle::Hairline" }
  - { cpp: sideButtonHintsStyle, type: SideButtonHintsStyle, default: "SideButtonHintsStyle::Sharp" }
  - { cpp: scrollIndicatorStyle, type: ScrollIndicatorStyle, default: "ScrollIndicatorStyle::Arrows" }
  - { cpp: batteryStyle,         type: BatteryStyle,         default: "BatteryStyle::Solid" }

  - group: layout
    struct_name: Layout
    fields:
      - { cpp: topPadding,        type: int, default: 0 }
      - { cpp: verticalSpacing,   type: int, default: 10 }
      - { cpp: contentSidePadding, type: int, default: 18 }

  - group: battery
    struct_name: Battery
    fields:
      - { cpp: width,     type: int, default: 16 }
      - { cpp: height,    type: int, default: 12 }
      - { cpp: barHeight, type: int, default: 40 }

  - group: buttonHints
    struct_name: ButtonHints
    fields:
      - { cpp: height,    type: int, default: 40 }
      - { cpp: sideWidth, type: int, default: 30 }

  - group: fontPreview
    struct_name: FontPreview
    fields:
      - { cpp: padding,       type: int, default: 12 }
      - { cpp: heightPercent, type: int, default: 30 }

  - group: tabBar
    struct_name: TabBar
    fields:
      - { cpp: spacing,  type: int,         default: 20 }
      - { cpp: height,   type: int,         default: 50 }
      - { cpp: style,    type: TabBarStyle,  default: "TabBarStyle::Underline" }
      - { cpp: fontRole, type: FontRole,     default: "FontRole::Body" }

  - group: scrollBar
    struct_name: ScrollBar
    fields:
      - { cpp: width,       type: int, default: 4 }
      - { cpp: rightOffset, type: int, default: 5 }

  - group: progressBar
    struct_name: ProgressBar
    fields:
      - { cpp: height,    type: int, default: 16 }
      - { cpp: marginTop, type: int, default: 1 }

  - group: statusBar
    struct_name: StatusBar
    fields:
      - { cpp: horizontalMargin, type: int, default: 5 }
      - { cpp: verticalMargin,   type: int, default: 19 }

  - group: keyboard
    struct_name: Keyboard
    fields:
      - { cpp: keyWidth,                          type: int,  default: 31 }
      - { cpp: keyHeight,                         type: int,  default: 40 }
      - { cpp: keySpacing,                        type: int,  default: 0 }
      - { cpp: bottomKeyHeight,                   type: int,  default: 35 }
      - { cpp: bottomKeySpacing,                  type: int,  default: 5 }
      - { cpp: bottomAligned,                     type: bool, default: true }
      - { cpp: centeredText,                      type: bool, default: false }
      - { cpp: verticalOffset,                    type: int,  default: -7 }
      - { cpp: textFieldWidthPercent,             type: int,  default: 85 }
      - { cpp: widthPercent,                      type: int,  default: 90 }
      - { cpp: keyCornerRadius,                   type: int,  default: 0 }
      - { cpp: fillUnselected,                    type: bool, default: false }
      - { cpp: outlineAllUnselected,              type: bool, default: false }
      - { cpp: drawSpecialOutlineWhenUnselected,  type: bool, default: true }
      - { cpp: secondaryLabelRightPadding,        type: int,  default: 1 }
      - { cpp: secondaryLabelTopPadding,          type: int,  default: 0 }
      - { cpp: minArrowHeadSize,                  type: int,  default: 0 }

  - group: library
    struct_name: Library
    fields:
      - { cpp: pageIndicatorShape,           type: IndicatorShape, default: IndicatorShape::Square }
      - { cpp: pageIndicatorSize,            type: int,            default: 9 }
      - { cpp: pageIndicatorBorder,          type: Color,          default: Color::Black }
      - { cpp: pageIndicatorBorderSelected,  type: Color,          default: Color::Black }
      - { cpp: pageIndicatorFill,            type: Color,          default: Color::Clear }
      - { cpp: pageIndicatorFillSelected,    type: Color,          default: Color::Black }
      - { cpp: pageIndicatorCornerRadius,    type: int,            default: 3 }
      - { cpp: pageIndicatorGap,             type: int,            default: 10 }
      - { cpp: coverBorderRadius,            type: int,            default: 0 }
      - { cpp: coverBorderWidth,             type: int,            default: 1 }
      - { cpp: coverDropShadowOffsetX,       type: int,            default: 3 }
      - { cpp: coverDropShadowOffsetY,       type: int,            default: 3 }
      - { cpp: pagePaddingX,                 type: int,            default: 0 }
      - { cpp: pagePaddingY,                 type: int,            default: 0 }

  - group: popup
    struct_name: Popup
    fields:
      - { cpp: topOffsetRatio,     type: float, default: "0.165f" }
      - { cpp: marginX,           type: int,   default: 16 }
      - { cpp: marginY,           type: int,   default: 12 }
      - { cpp: frameThickness,    type: int,   default: 2 }
      - { cpp: cornerRadius,      type: int,   default: 0 }
      - { cpp: textBold,          type: bool,  default: false }
      - { cpp: textInverted,      type: bool,  default: true }
      - { cpp: textBaselineOffsetY, type: int,  default: -2 }
    children:
      - group: progress
        struct_name: Progress
        fields:
          - { cpp: barHeight,       type: int,  default: 4 }
          - { cpp: drawOutline,     type: bool, default: false }
          - { cpp: clampPercent,    type: bool, default: false }
          - { cpp: fillInverted,    type: bool, default: false }
          - { cpp: outlineInverted, type: bool, default: false }

  - group: popupMenu
    struct_name: PopupMenu
    fields:
      - { cpp: rowHeight,             type: int,                       default: 38 }
      - { cpp: borderThickness,       type: int,                       default: 2 }
      - { cpp: cornerRadius,          type: int,                       default: 0 }
      - { cpp: shadowOffsetX,         type: int,                       default: 3 }
      - { cpp: shadowOffsetY,         type: int,                       default: 3 }
      - { cpp: paddingX,              type: int,                       default: 10 }
      - { cpp: panelGap,              type: int,                       default: 6 }
      - { cpp: selectionStyle,        type: PopupMenuSelectionStyle,   default: "PopupMenuSelectionStyle::SolidFill" }
      - { cpp: selectionCornerRadius, type: int,                       default: 0 }
      - { cpp: selectionTextInverted, type: bool,                      default: true }
      - { cpp: subPanelMutedFill,     type: bool,                      default: true }
      - { cpp: fontRole,              type: FontRole,                  default: "FontRole::Body" }

  - group: textField
    struct_name: TextField
    fields:
      - { cpp: horizontalPadding, type: int, default: 6 }
      - { cpp: normalThickness,   type: int, default: 1 }
      - { cpp: cursorThickness,   type: int, default: 3 }
      - { cpp: lineEndOffset,     type: int, default: 0 }

  - group: globalMenu
    struct_name: GlobalMenuThemeSettings
    fields:
      # Inset of the nav bar within its parent section, i.e. the margin between
      # the nav bar frame and the screen/body edges (1: nav-area padding).
      - { cpp: paddingX,              type: int,   default: 10 }
      - { cpp: paddingY,              type: int,   default: 10 }
      # Nav bar frame (7: border radius / border width).
      - { cpp: cornerRadius,          type: int,   default: 0 }
      - { cpp: borderWidth,           type: int,   default: 2 }
      # Nav bar drop shadow (5).
      - { cpp: shadowOffsetX,         type: int,   default: 3 }
      - { cpp: shadowOffsetY,         type: int,   default: 3 }
      # Gap between the nav bar and the popup it anchors (3). The gap between a
      # popup and its cascading children is popupMenu.panelGap (4).
      - { cpp: popupGap,              type: int,   default: 6 }
      # Selected-entry indicator (2: inset from slot; 6: fill + border; 7: radius).
      - { cpp: selectionPadding,      type: int,   default: 0 }
      - { cpp: selectionCornerRadius, type: int,   default: 0 }
      - { cpp: selectionFill,         type: Color, default: Color::Black }
      - { cpp: selectionBorderWidth,  type: int,   default: 0 }

  # Trailing top-level field
  - { cpp: showsFileIcons, type: bool, default: false }
