[platformio]
default_envs = default
build_cache_dir = .cache
extra_configs = platformio.local.ini

[crosspoint]
version = 1.3.0

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
# FreeInk SDK: X3+X4 share one ESP32-C3 binary, runtime-selected via setDisplayX3()
  -DFREEINK_DEVICE_X3=1
  -DFREEINK_DEVICE_X4=1
# wolfSSL TLS 1.3 transport (SecureNet) for HTTPS downloads: mbedTLS's handshake
# footprint OOMs this device. Skip Arduino-wolfSSL's x86_64 options.h (pre-define
# its WOLFSSL_OPTIONS_H guard) and drive config via its user_settings.h + the
# TLS1.3/SNI feature flags below.
  -DFREEINK_NET_WOLFSSL=1
  -DWOLFSSL_USER_SETTINGS
  -DWOLFSSL_OPTIONS_H
  -DWOLFSSL_TLS13
  -DHAVE_TLS_EXTENSIONS
  -DHAVE_SUPPORTED_CURVES
  -DHAVE_HKDF
  -DHAVE_FFDHE_2048
  -DHAVE_CURVE25519
  -DWC_RSA_PSS
  -DHAVE_SNI
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort,--wrap=bootloader_common_check_efuse_blk_validity
  -fno-exceptions
# Vendored Boost.PFR headers (header-only struct reflection) for JSON store
# serialization — see stores/util/PfrJson.h. Vendored rather than pulled via
# lib_deps because PFR's repo ships uncompilable example .cpp under modules/,
# and a remote lib_deps dep gives us no way to exclude them from the build.
  -Ithird_party/pfr

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/gen_theme.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py

; Libraries
lib_deps =
  BoardConfig=symlink://open-x4-sdk/libs/hardware/BoardConfig
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/FreeInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3
  wolfssl/Arduino-wolfSSL @ ^5.7.2
  SecureNet=symlink://open-x4-sdk/libs/network/SecureNet

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes branch + short SHA)
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
